<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222;
    }

    header {
      padding: 20px;
      text-align: center;
      background: white;
      border-bottom: 1px solid #eee;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px;
      background: white;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    nav a:hover {
      color: orange;
    }

    .container {
      text-align: center;
      padding: 50px;
    }

    .btn {
      background: black;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #444;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #eee;
      margin-top: 50px;
      font-size: 14px;
      color: gray;
    }
  </style>
</head>

<body>

  <header>
    <h1>My Website</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <div class="container">
    <h2>Welcome</h2>
    <p>Simple clean white modern website design.</p>
    <button class="btn">Click Me</button>
  </div>

  <footer>
    © 2026 My Website
  </footer>

</body>
</html>
